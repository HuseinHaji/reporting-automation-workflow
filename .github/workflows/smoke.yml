name: Streamlit Smoke Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate reporting outputs
        run: python src/run_pipeline.py
      - name: Streamlit import smoke check
        run: python -c "import streamlit; import src.app"
